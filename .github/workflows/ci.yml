name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    env:
      REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
      REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
      REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Python
        run: flake8 scripts/ dags/ --max-line-length=120

      - name: dbt deps
        run: dbt deps --project-dir dbt_project --profiles-dir dbt_project/profiles

      - name: Lint SQL
        run: sqlfluff lint dbt_project/models/

      - name: dbt compile
        run: dbt compile --project-dir dbt_project --profiles-dir dbt_project/profiles --target ci